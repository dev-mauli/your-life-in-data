name: Sync Portfolio Submodule

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Portfolio Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PORTFOLIO_REPO }}
          token: ${{ secrets.PORTFOLIO_UPDATE_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Update Submodule
        run: |
          git submodule update --remote your-life-in-data
          git add your-life-in-data

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --staged --quiet; then
            echo "No update needed"
          else
            git commit -m "Auto update your-life-in-data submodule"
            git push
          fi